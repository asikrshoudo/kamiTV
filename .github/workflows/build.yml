name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: yes | sdkmanager --licenses || true

      - run: gradle wrapper --gradle-version 8.6

      - run: chmod +x gradlew

      - run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > kamitv.jks
          APKSIGNER=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner
          ZIPALIGN=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/zipalign
          $ZIPALIGN -v 4 app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
          $APKSIGNER sign --ks kamitv.jks \
            --ks-pass pass:${{ secrets.KEY_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --out kamiTV-${GITHUB_REF_NAME}.apk \
            aligned.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: kamiTV-*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
